name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        run: sudo apt-get update && sudo apt-get install -y sqlite3 tmux

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: make check

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end
        run: pnpm e2e

      - name: Startup and performance smoke
        run: |
          pnpm dev > /tmp/citadel-dev.log 2>&1 &
          # Daemon's actual default is :4010 (config schema); the previous :4337
          # was a stale legacy doc value that made this loop run out 60s every time.
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:4010/api/health >/dev/null && curl -fsS http://127.0.0.1:5173 >/dev/null; then
              break
            fi
            sleep 1
          done
          make smoke
          pnpm performance
      - name: Dump dev log on failure
        if: failure()
        run: |
          echo "=== /tmp/citadel-dev.log ==="
          cat /tmp/citadel-dev.log || echo "(no dev log)"
          echo "=== ss -tlnp ==="
          ss -tlnp 2>/dev/null | head -20 || true
          echo "=== ls .citadel ==="
          ls -la .citadel 2>&1 || true
